# /etc/nginx/conf.d/connectea.conf
#
# Troque "api.seudominio.com.br" pelo seu subdomínio real antes de copiar
# este arquivo para o servidor. Depois de ativá-lo, rode o certbot
# (veja DEPLOY.md) — ele mesmo vai adicionar o bloco "listen 443 ssl" e
# o redirecionamento de HTTP para HTTPS automaticamente.

server {
    listen 80;
    server_name api.seudominio.com.br;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
